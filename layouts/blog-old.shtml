<extend template="base.shtml">
<head id="head"></head>
<body id="body">
	<p>
		<ctx :if="$page.nextPage?()">
			<a href="$if.link()">Next</a>
		</ctx>
		<ctx :if="$page.prevPage?()">
			<a href="$if.link()">Previous</a>
		</ctx>
		<a href="/attic/blog">Index</a>
	</p>
	<h1 :text="$page.title"></h1>
	<p :text="$page.date.format('2 Jan 2006')"></p>
	<div :html="$page.content()"></div>
</body>
