	<h1>Attic</h1>
	<div><p>You are in a dusty old attic.</p><p>To the north, an old bookshelf towers, draped in cobwebs. A faded label reads, “Blog posts, pre-July 2026”.</p><p>It feels like the ghost of an archivist haunts the room.</p><p>A rat scurries past.</p></div>
	<div>><input id="cmd" type="text" class="attic-input" placeholder="_"></div>
	<script>
		document.addEventListener("DOMContentLoaded", () => {
			const cmdInput = document.getElementById('cmd');
			cmdInput.addEventListener('keydown', function(event) {
				if (event.key === 'Enter') {
					switch (event.target.value.toLowerCase()) {
						case 'go north':
							window.location.href = "blog";
						default:

					}
				}
			});
	});
	</script>
